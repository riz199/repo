<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Protected Links</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="bootstrap-icons-1.13.1/bootstrap.min.css" rel="stylesheet">
<script src="crypto-js.min.js"></script>

<style>
body { display: flex; justify-content: center; align-items: center; height: 100vh; }
.container { max-width: 400px; }

/* Toast Notifications */
#toastContainer {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
  width: auto;
  max-width: 90%;
  align-items: center;
}
.toast {
  background-color: #333; color: #fff; padding: 10px 15px;
  border-radius: 6px; min-width: 200px; max-width: 100%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  font-size: 0.9rem; text-align: center; opacity: 0;
  transform: translateY(-20px);
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: auto; word-wrap: break-word;
}
.toast.show { opacity: 0.95; transform: translateY(0); }
.toast-success { background-color: #28a745; }
.toast-error { background-color: #dc3545; }
.toast-info { background-color: #17a2b8; }
</style>
</head>
<body>

<div class="container text-center">
  <h4 class="mb-4">🔒 Protected Links</h4>
  <div id="loginBox">
    <input type="password" inputmode="numeric" pattern="[0-9]*" id="password" class="form-control mb-3" placeholder="Enter password">
    <button class="btn btn-primary w-100" onclick="baseUnlock()">Unlock</button>
	  <input type="file" id="fileInput" style="display:none;">
  </div>
  <div id="links" class="d-none mt-4"></div>
</div>

<div id="toastContainer"></div>

<!-- Load base.js AFTER hidden fields -->
<script src="base.js"></script>

<script>
// Encrypted URLs
const encryptedLinks = [
  "U2FsdGVkX1800eWr1PS76rhWN2ETh7jpbKvIWypjAsRZsNPoljLB9OlaxpXZEuIq",
  "U2FsdGVkX1/j2bSaF+OEf3PCfAdJHpfl/MbwH4qIYiKbjOPXs7WIm0J9Rmur2MrB",
  "U2FsdGVkX18oi+OlUjjx3GiDp2CpXtDMhkdaeWfuXzA=="
  //"U2FsdGVkX1800eWr1PS76rhWN2ETh7jpbKvIWypjAsRZsNPoljLB9OlaxpXZEuIq"
];

// Encrypted button titles
const encryptedTitles = [
  "U2FsdGVkX19OVP3R040IaZtriCbo1o9MGYFgjHvJcg0=",
  "U2FsdGVkX1/09k4hzRy6kYfuxtE7QUluzgnrKg5y/g0=",
  "U2FsdGVkX1/5/V/OfDispBdXO30HeBWS2KO6xu//2E0="
 //"U2FsdGVkX19OVP3R040IaZtriCbo1o9MGYFgjHvJcg0="
];

function baseUnlock() {
  const rawPass = document.getElementById("password").value.trim();
  if (!rawPass) { showToast("Enter password", "error"); return; }

  let html = "";
  try {
    encryptedLinks.forEach((enc, i) => {
      const link = base.decryptText(enc, rawPass, false);
      const title = base.decryptText(encryptedTitles[i], rawPass, false);
      html += `<a href="${link}" target="_blank" class="btn btn-outline-success d-block mb-2">${title}</a>`;
    });

    document.getElementById("links").innerHTML = html;
    document.getElementById("loginBox").classList.add("d-none");
    document.getElementById("links").classList.remove("d-none");
    showToast("✅ Links unlocked", "success");
  } catch (err) {
    console.error(err);
    showToast("❌ Wrong password", "error");
	document.getElementById("password").value = "";
  }
}



// Auto-unlock with debounce
let unlockTimer;
const passwordInput = document.getElementById("password");
passwordInput.addEventListener("input", function() {
  clearTimeout(unlockTimer);
  unlockTimer = setTimeout(() => baseUnlock(), 1);
});

// Auto-focus the input on page load
window.addEventListener("DOMContentLoaded", () => {
  passwordInput.focus();
});

//Enter to unlock
passwordInput.addEventListener("keyup", function(e) {
  if (e.key === "Enter") {
    clearTimeout(unlockTimer); // cancel any pending debounce
    baseUnlock();
  }
});

</script>

</body>
</html>
