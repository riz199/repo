<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>XML Viewer & Editor</title>
<style>
/* ===== Base Styles ===== */
body {
  font-family: 'Inter', Arial, sans-serif;
  background-color: #f9fafb;
  color: #111;
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}

h2, h3 {
  text-align: center;
  font-weight: 600;
  margin-bottom: 20px;
}

textarea, input[type="text"], input[type="file"] {
  width: 100%;
  margin: 10px 0;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 0.95rem;
  box-sizing: border-box;
  font-family: monospace;
  background-color: #fff;
  color: #111;
}

#queryBox {
  resize: vertical;   /* Only allow vertical resizing */
}

.file-zone {
  border: 2px dashed #ddd;
  padding: 20px;
  border-radius: 8px;
  text-align: center;
  margin-bottom: 20px;
  background-color: #fefefe;
}

button {
  height: 42px;
  font-size: 0.95rem;
  padding: 0 15px;
  border-radius: 6px;
  border: none;
  background-color: #007bff;
  color: white;
  transition: background-color 0.2s ease-in-out;
  cursor: pointer;
  white-space: nowrap;
  margin-top: 10px;
}

button:hover { background-color: #0056b3; }
button:active { background-color: #004a99; }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
}

th {
  background-color: #f1f1f1;
  text-align: left;
}

/* ===== Toast Notifications ===== */
#toastContainer {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 99999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
  width: auto;
  max-width: 90%;
  align-items: center;
}

.toast {
  background-color: #333;
  color: white;
  padding: 10px 15px;
  border-radius: 6px;
  min-width: 200px;
  max-width: 100%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  font-size: 0.9rem;
  text-align: center;
  opacity: 0;
  transform: translateY(-20px);
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: auto;
  word-wrap: break-word;
}

.toast.show {
  opacity: 0.95;
  transform: translateY(0);
}

.toast-success { background-color: #28a745; }
.toast-error { background-color: #dc3545; }
.toast-info { background-color: #17a2b8; }

/* ===== Responsive ===== */
@media (max-width: 420px) {
  button { font-size: 0.85rem; padding: 0 10px; height: 40px; }
  textarea { font-size: 0.85rem; }
}

</style>
</head>
<body>
<div class="container">

  <h2>XML Viewer & Editor</h2>

  <div class="file-zone">
    <!--input type="file" id="fileInput" multiple accept=".txt,.xml" /-->
    <input type="file" id="fileInput" multiple accept=".xml" />
    <!--p>Select one or more .txt or .xml files</p-->
  </div>

  <h3>SQL‑like Query</h3>
  <textarea id="queryBox" placeholder="Example: select AccountLabel from database where Owner like Utility"></textarea>
  <div style="display: flex; gap: 10px; align-items: center;">
  <button id="runQueryBtn" onclick="runQuery()">Run Query</button>
  <button id="exportBtn" style="display:none;">Export CSV</button>
  </div>


  <div id="resultTable"></div>

</div>
<div id="toastContainer"></div>
<script>
let xmlRecords = []; // Parsed ACTDET objects from all loaded files

// ------------------ FILE LOADING ------------------
document.getElementById("fileInput").addEventListener("change", async function(e) {
  xmlRecords = []; // reset

  for (const file of e.target.files) {
    const text = await file.text();
    parseXMLText(text, file.name); // ✅ Pass the filename here
  }

  showToast("Files loaded & parsed: " + xmlRecords.length + " ACTDET entries", "success");
});


// ------------------ FILE LOADING ------------------
// Parse XML-like content manually (simple approach)
function parseXMLText(text, filename) {
  const blocks = text.split(/<ACTDET>/i).slice(1);
  for (let block of blocks) {
    block = block.split(/<\/ACTDET>/i)[0];
    const obj = {};

    // ✅ Add filename to each record
    obj.filename = filename;

    // Find all <Tag>value</Tag>
    const regex = /<([^>]+)>([\s\S]*?)<\/\1>/g;
    let match;
    while ((match = regex.exec(block)) !== null) {
      const tag = match[1].trim();
      const val = match[2].trim();
      obj[tag] = val;
    }
    xmlRecords.push(obj);
  }
}

// Helper: get value from record ignoring column case
function getValue(record, colName) {
  colName = colName.toLowerCase();
  for (const key in record) {
    if (key.toLowerCase() === colName) return record[key] || "";
  }
  return "";
}


// ------------------ QUERY ENGINE ------------------
function runQuery() {
  const qRaw = document.getElementById("queryBox").value.trim();
  if (!qRaw) return showToast("Please enter a query.", "info");


const qLower = qRaw.toLowerCase().trim();


// Special case: DESC database -> show all column names
if (/^desc\s+database$/i.test(qRaw)) {
  // Collect all column names
  const colsSet = new Set();
  xmlRecords.forEach(r => Object.keys(r).forEach(k => colsSet.add(k)));
  const cols = [...colsSet];
  
  let tableHTML = "<table><thead><tr><th>Column Name</th></tr></thead><tbody>";
  cols.forEach(c => tableHTML += `<tr><td>${c}</td></tr>`);
  tableHTML += "</tbody></table>";
  document.getElementById("resultTable").innerHTML = tableHTML;
  return;
}

// 1️⃣ Desc a specific file: desc masterxml_frequent or desc masterxml_frequent.xml
let descMatch = qLower.match(/^desc\s+([a-z0-9_.]+)$/i);
if (descMatch) {
    const fileName = descMatch[1];
    // Find the first record from that file (case-insensitive, ignore extension)
    const rec = xmlRecords.find(r => {
        const fn = r.filename.toLowerCase();
        const fnNoExt = fn.replace(/\.[^/.]+$/, "");
        return fn === fileName || fnNoExt === fileName;
    });

    if (!rec) {
        return showToast("File not found or no records loaded for: " + fileName, "error");
    }

    const cols = Object.keys(rec);
    let tableHTML = "<table><thead><tr><th>Column Name</th></tr></thead><tbody>";
    cols.forEach(c => tableHTML += `<tr><td>${c}</td></tr>`);
    tableHTML += "</tbody></table>";
    document.getElementById("resultTable").innerHTML = tableHTML;
    return;
}

// 2️⃣ Show all loaded files
if (qLower === "show databases" || qLower === "show database" || qLower === "show filenames") {
    // Get unique filenames
    const files = [...new Set(xmlRecords.map(r => r.filename))];
    let tableHTML = "<table><thead><tr><th>Filename</th></tr></thead><tbody>";
    files.forEach(f => tableHTML += `<tr><td>${f}</td></tr>`);
    tableHTML += "</tbody></table>";
    document.getElementById("resultTable").innerHTML = tableHTML;
    return;
}





  // Parse query: select fields and optional where clause
  const pattern = /^select\s+([a-zA-Z0-9_*,\s]+)\s+from\s+([a-zA-Z0-9_.]+)(?:\s+where\s+(.+))?$/i;
  const m = qRaw.match(pattern);
if (!m) {
    console.log("Query examples:\n  select AccountLabel from database\n  select Owner,Category,AccountLabel from database where Category like Work\n  select * from database where Owner like \"Utility\"");
    showToast("Invalid query format. See console for examples.", "error");
    return;
}


  // Parse select fields
  const selectPart = m[1].trim();
  const selectFields = selectPart === "*" 
    ? ["*"] 
    : selectPart.split(",").map(s => s.trim()).filter(Boolean);

  // Parse table name
  const tableName = m[2].trim().toLowerCase();

  // Parse where clause (if any)
  let whereRaw = m[3] ? m[3].trim() : null;



// Select records based on table
let results;
if (tableName === "database") {
  results = xmlRecords.slice(); // all files
} else {
  results = xmlRecords.filter(r => {
    const fn = r.filename.toLowerCase();
    // Remove extension from filename for comparison
    const fnNoExt = fn.replace(/\.[^/.]+$/, "");
    return fn === tableName || fnNoExt === tableName;
  });
}


  // Filter results if WHERE clause present
  if (whereRaw) {
    // Split multiple conditions by AND / OR
    const conditions = whereRaw.split(/\s+(and|or)\s+/i);
    const operators = [];
    const conds = [];
    for (let i = 0; i < conditions.length; i++) {
      if (i % 2 === 1) {
        operators.push(conditions[i].toLowerCase());
      } else {
        conds.push(conditions[i]);
      }
    }

    results = results.filter(record => {
      let res = null;
      for (let i = 0; i < conds.length; i++) {
        
		const condMatch = conds[i].match(/^([a-zA-Z0-9_]+)\s+(not\s+like|like)\s+(.+)$/i);
		if (!condMatch) return false;
		
		const col = condMatch[1].trim();
		const operator = condMatch[2].trim().toLowerCase(); // "like" or "not like"
		let val = condMatch[3].trim();
		val = val.replace(/^["']|["']$/g, ""); // remove quotes
		
		let match = getValue(record, col).toLowerCase().includes(val.toLowerCase());
		if (operator === "not like") match = !match;

		
        if (i === 0) res = match;
        else {
          const op = operators[i - 1];
          if (op === "and") res = res && match;
          else if (op === "or") res = res || match;
        }
      }
      return res;
    });
  }

  // Build table
  if (!results.length) {
    document.getElementById("resultTable").innerHTML = "<div style='color:#f0ad4e; margin-top:12px;'>No results found.</div>";
    return;
  }

  // Determine columns
  let columns = [];
  if (selectFields.length === 1 && selectFields[0] === "*") {
    const colsSet = new Set();
    results.forEach(r => Object.keys(r).forEach(k => colsSet.add(k)));
    columns = [...colsSet];
  } else {
    columns = selectFields;
  }

// Make results and columns global for sorting
window.resultsGlobal = results;
window.columnsGlobal = columns;


  // Build HTML table
  let tableHTML = "<table><thead><tr>";
  columns.forEach(c => {
  tableHTML += `<th>${c} <button onclick="sortAndRebuild('${c}')">⇅</button></th>`;
  });
  tableHTML += "</tr></thead><tbody>";

  results.forEach(r => {
    tableHTML += "<tr>";
    columns.forEach(c => tableHTML += `<td>${getValue(r, c)}</td>`);
    tableHTML += "</tr>";
  });

  tableHTML += "</tbody></table>";
  document.getElementById("resultTable").innerHTML = tableHTML;
  
  document.getElementById("resultTable").innerHTML = tableHTML;
  showExportButton();  // show export button now

  
}

// ===== Export CSV =====
function exportTableToCSV(filename) {
    if (!window.resultsGlobal || !window.columnsGlobal) return;

    const rows = [];

    // Header row
    rows.push(window.columnsGlobal.join(","));

    // Data rows
    window.resultsGlobal.forEach(record => {
        const row = window.columnsGlobal.map(col => {
            let val = getValue(record, col) || "";
            val = val.toString(); // ensure string
            // Escape quotes and line breaks
            if (val.includes('"') || val.includes(',') || val.includes('\n') || val.includes('\r')) {
                val = `"${val.replace(/"/g, '""')}"`;
            }
            return val;
        });
        rows.push(row.join(","));
    });

    const csvContent = rows.join("\r\n"); // Use CRLF to properly handle newlines in Excel
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", filename);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}



// ===== Show export button when table is loaded =====
function showExportButton() {
    const btn = document.getElementById("exportBtn");
    btn.style.display = "inline-block";
    btn.onclick = () => {
        const now = new Date();
        const pad = n => n.toString().padStart(2,'0');
        const DD = pad(now.getDate());
        const MM = pad(now.getMonth()+1);
        const YYYY = now.getFullYear();
        const HH = pad(now.getHours());
        const MI = pad(now.getMinutes());
        const SS = pad(now.getSeconds());

        const filename = `xmlexport${DD}${MM}${YYYY}${HH}${MI}${SS}.csv`;
        exportTableToCSV(filename);
    };
}




//to sort the columns in the table function
let currentSort = { column: null, asc: true };

function sortTable(results, column) {
  const sorted = results.slice(); // shallow copy

  sorted.sort((a, b) => {
    const valA = getValue(a, column).toString().toLowerCase();
    const valB = getValue(b, column).toString().toLowerCase();
    if (valA < valB) return currentSort.asc ? -1 : 1;
    if (valA > valB) return currentSort.asc ? 1 : -1;
    return 0;
  });

  currentSort.asc = currentSort.column === column ? !currentSort.asc : true;
  currentSort.column = column;

  return sorted;
}



function sortAndRebuild(column) {
  if (!resultsGlobal || !resultsGlobal.length) return;

  resultsGlobal = sortTable(resultsGlobal, column);

  // Rebuild table body
  const tbody = resultsGlobal.map(r => {
    let row = "<tr>";
    columnsGlobal.forEach(c => row += `<td>${getValue(r, c)}</td>`);
    row += "</tr>";
    return row;
  }).join("");

  document.querySelector("#resultTable table tbody").innerHTML = tbody;
}
//Sortting table ends here.


// Run query on Ctrl + Enter
document.getElementById("queryBox").addEventListener("keydown", function(e) {
    if (e.ctrlKey && e.key === "Enter") {
        e.preventDefault(); // prevent any default behavior
        runQuery();
    }
});


// ===== Toast Function =====
function showToast(message, type = "info", duration = 3000) {
    const container = document.getElementById("toastContainer");
    const toast = document.createElement("div");
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    container.appendChild(toast);

    // Force reflow for animation
    void toast.offsetWidth;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 300);
    }, duration);
}

// becomes:
showToast("Files loaded & parsed: " + xmlRecords.length + " ACTDET entries", "success");

// For info messages:
 // showToast("Please enter a query.", "info");

// ===== Toast Function Ends =====

</script>


</body>
